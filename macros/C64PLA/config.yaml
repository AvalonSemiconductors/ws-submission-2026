meta:
  version: 3
  flow: Classic
  substituting_steps:
    OpenROAD.Resizertimingpostcts: null
    OpenROAD.CTS: null
    OpenROAD.RepairDesignPostGPL: null
    OpenROAD.STAMidPnr: null
    +Magic.DRC: KLayout.Antenna
    +Checker.MagicDRC: Checker.KLayoutAntenna

DESIGN_NAME: c64pla
VERILOG_FILES: ["dir::src/pla.v", "dir::src/wrapped_pla.v"]
CLOCK_PERIOD: 100
DIE_AREA: [0, 0, 90, 150]
RUN_MAGIC_DRC: true
RSZ_DONT_TOUCH_RX: ".*pla_dlyb_.*"
PL_RESIZER_SETUP_SLACK_MARGIN: 0
GRT_RESIZER_SETUP_SLACK_MARGIN: 0
GRT_RESIZER_HOLD_SLACK_MARGIN: 0
PL_RESIZER_HOLD_SLACK_MARGIN: 0
PNR_SDC_FILE: dir::../base.sdc
SIGNOFF_SDC_FILE: dir::../base.sdc
RUN_CTS: true
DESIGN_REPAIR_TIE_FANOUT: true
DRT_ANTENNA_REPAIR_ITERS: 10
GRT_ANTENNA_REPAIR_MARGIN: 60
DRT_ANTENNA_REPAIR_MARGIN: 40
DIODE_ON_PORTS: both
MAX_FANOUT_CONSTRAINT: 4
MAX_TRANSITION_CONSTRAINT: 1.5
VDD_NETS: ["VDD"]
GND_NETS: ["VSS"]
VERILOG_POWER_DEFINE: "USE_POWER_PINS"
RT_MAX_LAYER: Metal4
FP_PIN_ORDER_CFG: dir::pin_order.cfg
FP_PDN_MULTILAYER: false
FP_SIZING: absolute
IO_PIN_H_LAYER: Metal4
IO_PIN_V_LAYER: Metal3

KLAYOUT_DRC_THREADS: 1
KLAYOUT_DRC_OPTIONS:
  workers: max
  decks: "all,-antenna,-density"

KLAYOUT_ANTENNA_OPTIONS:
  workers: max
  decks: "antenna"

STD_CELL_LIBRARY: "gf180mcu_as_sc_mcu7t3v3"

KLAYOUT_RENDER_RESOLUTION: 8192
KLAYOUT_RENDER_OVERSAMPLING: 3
KLAYOUT_PROPERTIES: dir::../../librelane/gf180mcu_render.lyp
