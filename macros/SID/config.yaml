meta:
  version: 3
  flow: Classic
  substituting_steps:
    +Magic.DRC: KLayout.Antenna
    +Checker.MagicDRC: Checker.KLayoutAntenna

DESIGN_NAME: sid
VERILOG_FILES: ["dir::src/SID_channels.v", "dir::src/SID_filter.v", "dir::src/SID_top.v", "dir::src/spi_dac_i.v", "dir::src/wrapped_sid.v", "dir::src/adc.v"]
CLOCK_PERIOD: 60
DIE_AREA: [0, 0, 600, 900]
RUN_MAGIC_DRC: true
DESIGN_REPAIR_TIE_FANOUT: true
DIODE_ON_PORTS: both
SYNTH_STRATEGY: AREA 1
PL_RESIZER_SETUP_SLACK_MARGIN: 0.2
GRT_RESIZER_SETUP_SLACK_MARGIN: 0.2
GRT_RESIZER_HOLD_SLACK_MARGIN: 0.3
PL_RESIZER_HOLD_SLACK_MARGIN: 0.3
PL_RESIZER_HOLD_MAX_BUFFER_PCT: 100
GRT_ANTENNA_MARGIN: 60
DRT_ANTENNA_MARGIN: 60
MAX_CAPACITANCE_CONSTRAINT: 0.3
DRT_ANTENNA_REPAIR_ITERS: 10
PNR_SDC_FILE: dir::../base.sdc
SIGNOFF_SDC_FILE: dir::../base.sdc
RUN_CTS: true
CLOCK_PORT: clk_i
CLOCK_NET: clk_i
VDD_NETS: ["VDD"]
GND_NETS: ["VSS"]
VERILOG_POWER_DEFINE: "USE_POWER_PINS"
RT_MAX_LAYER: Metal4
FP_PIN_ORDER_CFG: dir::pin_order.cfg
FP_PDN_MULTILAYER: false
FP_SIZING: absolute
FP_IO_HLAYER: Metal3
FP_IO_VLAYER: Metal4

KLAYOUT_DRC_THREADS: 1
KLAYOUT_DRC_OPTIONS:
  workers: max
  decks: "all,-antenna,-density"

KLAYOUT_ANTENNA_OPTIONS:
  workers: max
  decks: "antenna"

STD_CELL_LIBRARY: "gf180mcu_as_sc_mcu7t3v3"

KLAYOUT_RENDER_RESOLUTION: 8192
KLAYOUT_RENDER_OVERSAMPLING: 3
KLAYOUT_PROPERTIES: dir::../../librelane/gf180mcu_render.lyp
